version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: self-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: self-rag-postgres
    environment:
      POSTGRES_USER: selfrag_user
      POSTGRES_PASSWORD: selfrag_pass
      POSTGRES_DB: selfrag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: