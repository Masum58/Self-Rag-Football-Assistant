<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Self-RAG Football Assistant — AI-powered football Q&A with Self-RAG retrieval grading" />
  <title>Self-RAG Football Assistant</title>

  <!-- React 18 + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════ */
    :root {
      --bg-root:        #07090d;
      --bg-primary:     #0b0e14;
      --bg-secondary:   #0f1318;
      --bg-card:        #141820;
      --bg-hover:       #181d26;
      --bg-input:       #1a1f2c;

      --accent:         #1D9E75;
      --accent-dark:    #0d6e52;
      --accent-light:   #5DCAA5;
      --accent-glow:    rgba(29, 158, 117, 0.13);
      --accent-glow2:   rgba(29, 158, 117, 0.25);

      --text-primary:   #e9e7e2;
      --text-secondary: #9b9994;
      --text-muted:     #585653;

      --border:         rgba(255,255,255,0.055);
      --border-strong:  rgba(255,255,255,0.09);
      --border-accent:  rgba(29,158,117,0.28);

      --red:            #e05252;
      --red-bg:         rgba(224,82,82,0.1);
      --red-border:     rgba(224,82,82,0.25);

      --yellow:         #d4a839;
      --yellow-bg:      rgba(212,168,57,0.1);

      --sidebar-w:      265px;
      --header-h:       58px;
      --radius:         11px;
      --radius-lg:      18px;
      --radius-xl:      24px;
    }

    /* ══════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg-root);
      color: var(--text-primary);
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--accent); color: #fff; }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #252b38; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #303848; }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    #root { display: flex; flex-direction: column; height: 100vh; }

    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .header {
      height: var(--header-h);
      background: rgba(7,9,13,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 200;
      flex-shrink: 0;
    }

    .hamburger {
      width: 34px; height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 5px;
      padding: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .hamburger:hover { background: var(--bg-hover); }
    .hamburger span {
      display: block; width: 18px; height: 1.5px;
      background: var(--text-secondary);
      border-radius: 2px;
      transition: all 0.25s ease;
    }

    .header-brand {
      display: flex; align-items: center; gap: 9px;
    }

    .brand-icon {
      width: 33px; height: 33px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 22px var(--accent-glow2);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 15px; font-weight: 600; letter-spacing: -0.02em;
      background: linear-gradient(90deg, #e9e7e2 30%, var(--accent-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-tag {
      font-size: 10px; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase;
      background: var(--accent-glow);
      color: var(--accent-light);
      border: 1px solid var(--border-accent);
      border-radius: 5px;
      padding: 2px 7px;
      margin-left: 2px;
    }

    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }

    /* Status badge */
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 12px; font-weight: 500;
      border: 1px solid;
      transition: all 0.35s ease;
      cursor: pointer;
      user-select: none;
    }
    .status-pill.ok   { background: var(--accent-glow); border-color: var(--border-accent); color: var(--accent-light); }
    .status-pill.fail { background: var(--red-bg); border-color: var(--red-border); color: #f09595; }
    .status-pill.idle { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--text-muted); }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .status-dot.ok   { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulseDot 2s infinite; }
    .status-dot.fail { background: var(--red); }
    .status-dot.idle { background: #555; animation: blinkDot 1.6s infinite; }

    @keyframes pulseDot {
      0%,100% { opacity:1; box-shadow: 0 0 6px var(--accent); }
      50%      { opacity:.65; box-shadow: 0 0 14px var(--accent); }
    }
    @keyframes blinkDot { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    /* ══════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════ */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
      z-index: 150;
      animation: fadeIn 0.2s ease;
    }
    .sidebar-overlay.show { display: block; }

    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.28s cubic-bezier(.4,0,.2,1);
      flex-shrink: 0;
      z-index: 160;
    }
    .sidebar.closed { width: 0; }

    .sidebar-top {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .new-chat-btn {
      width: 100%;
      padding: 10px 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border: none; border-radius: var(--radius);
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 18px var(--accent-glow2);
      transition: all 0.2s ease;
      letter-spacing: -0.01em;
    }
    .new-chat-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow2);
    }
    .new-chat-btn:active { transform: translateY(0); }

    .sessions-scroll { flex: 1; overflow-y: auto; padding: 8px 8px 16px; }

    .sessions-label {
      font-size: 10.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--text-muted);
      padding: 10px 8px 6px;
    }

    .session-item {
      padding: 9px 11px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      border: 1px solid transparent;
      position: relative;
      transition: all 0.14s ease;
      display: flex; flex-direction: column; gap: 3px;
    }
    .session-item:hover { background: var(--bg-hover); }
    .session-item.active {
      background: var(--accent-glow);
      border-color: var(--border-accent);
    }

    .session-name {
      font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      padding-right: 22px;
    }

    .session-meta {
      font-size: 11px; color: var(--text-muted);
      display: flex; gap: 5px; align-items: center;
    }

    .session-del {
      position: absolute; right: 7px; top: 50%;
      transform: translateY(-50%);
      width: 22px; height: 22px;
      border: none; background: transparent;
      color: var(--text-muted); cursor: pointer;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      opacity: 0;
      transition: all 0.13s;
      font-family: sans-serif;
    }
    .session-item:hover .session-del { opacity: 1; }
    .session-del:hover { background: var(--red-bg); color: var(--red); }

    /* ══════════════════════════════════════════
       CHAT AREA
    ══════════════════════════════════════════ */
    .chat-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
      min-width: 0;
    }

    /* Config bar */
    .config-bar {
      display: flex; align-items: center;
      gap: 8px; padding: 9px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,14,20,0.7);
      flex-shrink: 0; flex-wrap: wrap;
    }

    .cfg-group { display: flex; align-items: center; gap: 5px; }
    .cfg-label { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; }

    .cfg-input {
      padding: 4px 9px;
      background: var(--bg-input);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 110px;
    }
    .cfg-input:focus { border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .cfg-sep {
      width: 1px; height: 16px;
      background: var(--border-strong);
      margin: 0 2px;
    }

    .session-id-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent-light);
      background: var(--accent-glow);
      border: 1px solid var(--border-accent);
      border-radius: 5px;
      padding: 2px 8px;
    }

    /* Messages */
    .msgs-wrap {
      flex: 1; overflow-y: auto;
      padding: 22px 18px 12px;
      display: flex; flex-direction: column;
    }

    /* Empty state */
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 40px 24px;
    }
    .empty-ball {
      font-size: 52px;
      filter: drop-shadow(0 0 24px var(--accent-glow2));
      animation: floatBall 3s ease-in-out infinite;
    }
    @keyframes floatBall {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .empty-title { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); }
    .empty-sub   { font-size: 14px; color: var(--text-secondary); max-width: 320px; line-height: 1.65; }

    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 6px;
    }
    .chip {
      padding: 8px 15px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      font-size: 13px; color: var(--text-secondary);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }
    .chip:hover {
      background: var(--accent-glow); border-color: var(--border-accent);
      color: var(--accent-light); transform: translateY(-1px);
    }

    /* Message group */
    .msg-group {
      display: flex; flex-direction: column;
      margin-bottom: 6px;
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .msg-row {
      display: flex; gap: 10px;
      align-items: flex-start;
    }
    .msg-row.user-row { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.user-av {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow: 0 2px 12px var(--accent-glow2);
    }
    .avatar.bot-av {
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
    }

    .bubble {
      max-width: 74%; border-radius: var(--radius-lg);
      padding: 11px 15px;
      font-size: 14.5px; line-height: 1.68;
      position: relative;
    }
    .bubble.user-b {
      background: linear-gradient(135deg, var(--accent-dark), #0a503c);
      color: #e2f7f0;
      border-bottom-right-radius: 4px;
    }
    .bubble.bot-b {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside bubble */
    .bubble p         { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong    { color: var(--accent-light); font-weight: 600; }
    .bubble em        { font-style: italic; color: var(--text-secondary); }
    .bubble ul,.bubble ol { padding-left: 18px; margin: 8px 0; }
    .bubble li        { margin: 4px 0; }
    .bubble h1,.bubble h2,.bubble h3 { color: var(--accent-light); margin: 14px 0 6px; font-weight: 600; }
    .bubble h1 { font-size: 17px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; }
    .bubble a         { color: var(--accent-light); text-decoration: underline; text-underline-offset: 3px; }
    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px; padding: 2px 6px;
      background: rgba(0,0,0,0.3);
      border-radius: 4px; color: #a8d5c2;
    }
    .bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-strong);
      border-radius: 8px; padding: 12px;
      overflow-x: auto; margin: 10px 0;
    }
    .bubble pre code { background: none; padding: 0; font-size: 12.5px; }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px; margin: 8px 0;
      color: var(--text-secondary);
    }
    .bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .bubble th,.bubble td { border: 1px solid var(--border-strong); padding: 6px 10px; font-size: 13px; }
    .bubble th { background: var(--bg-hover); color: var(--accent-light); font-weight: 600; }
    .bubble hr { border: none; border-top: 1px solid var(--border-strong); margin: 10px 0; }

    /* Streaming cursor */
    .stream-cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--accent);
      border-radius: 1px;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blinkCursor 0.7s infinite;
    }
    @keyframes blinkCursor { 0%,100% { opacity:1; } 50% { opacity:0; } }

    /* Message footer */
    .msg-footer {
      display: flex; align-items: center;
      gap: 8px; margin-top: 5px; padding: 0 4px;
    }
    .msg-footer.user-foot { justify-content: flex-end; }

    .ts { font-size: 11px; color: var(--text-muted); }

    /* Copy button */
    .copy-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      background: var(--bg-hover);
      border: 1px solid var(--border-strong);
      border-radius: 5px;
      color: var(--text-muted);
      font-size: 11px; font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .copy-btn:hover  { background: var(--accent-glow); color: var(--accent-light); border-color: var(--border-accent); }
    .copy-btn.done   { color: var(--accent-light); border-color: var(--border-accent); background: var(--accent-glow); }

    /* Grading panel */
    .grading {
      margin-top: 8px; margin-left: 40px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      animation: slideUp 0.2s ease;
    }

    .grading-head {
      font-size: 10.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--text-muted); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }

    .grading-row { display: flex; gap: 7px; flex-wrap: wrap; }

    .g-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px; font-weight: 500;
      border: 1px solid; cursor: default;
      transition: all 0.2s;
    }
    .g-badge.pass {
      background: var(--accent-glow); border-color: var(--border-accent);
      color: var(--accent-light);
    }
    .g-badge.fail {
      background: var(--red-bg); border-color: var(--red-border);
      color: #f09595;
    }
    .g-badge.na {
      background: var(--yellow-bg); border-color: rgba(212,168,57,0.3);
      color: var(--yellow);
    }
    .g-icon { font-size: 11px; }

    /* Error bubble */
    .err-bubble {
      margin-top: 7px; margin-left: 40px;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 13px; color: #f09595;
      line-height: 1.5;
    }

    /* Typing indicator */
    .typing-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
      animation: slideUp 0.2s ease;
    }

    .typing-dots {
      display: flex; gap: 4px; align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg); border-bottom-left-radius: 4px;
      padding: 13px 16px;
    }
    .t-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .t-dot:nth-child(1) { animation-delay: 0s;    }
    .t-dot:nth-child(2) { animation-delay: 0.15s; }
    .t-dot:nth-child(3) { animation-delay: 0.3s;  }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.35; }
      30%          { transform: translateY(-7px); opacity: 1; }
    }

    .typing-label { font-size: 12px; color: var(--text-muted); font-style: italic; }

    /* ══════════════════════════════════════════
       INPUT AREA
    ══════════════════════════════════════════ */
    .input-zone {
      padding: 12px 18px 18px;
      background: rgba(7,9,13,0.85);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-box {
      display: flex; align-items: flex-end; gap: 9px;
      background: var(--bg-input);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .chat-ta {
      flex: 1; background: transparent; border: none;
      color: var(--text-primary);
      font-size: 14.5px; font-family: 'Inter', sans-serif;
      resize: none; outline: none;
      max-height: 130px; min-height: 24px; line-height: 1.55;
    }
    .chat-ta::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px; height: 38px; border-radius: 12px;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fff;
      box-shadow: 0 3px 14px var(--accent-glow2);
      transition: all 0.2s ease;
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 5px 20px var(--accent-glow2); }
    .send-btn:disabled { opacity: 0.35; cursor: default; }

    .input-hint {
      font-size: 11px; color: var(--text-muted);
      text-align: right; margin-top: 7px;
      display: flex; justify-content: flex-end; gap: 14px;
    }
    .hint-key {
      display: inline-flex; align-items: center;
      background: var(--bg-card); border: 1px solid var(--border-strong);
      border-radius: 4px; padding: 1px 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-muted); margin-right: 3px;
    }

    /* ══════════════════════════════════════════
       MOBILE
    ══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; top: 0; left: 0;
        height: 100%; z-index: 160;
        transform: translateX(-100%);
        width: var(--sidebar-w) !important;
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      }
      .sidebar.mobile-open { transform: translateX(0); }
      .sidebar.closed { transform: translateX(-100%); }

      .bubble { max-width: 88%; }
      .config-bar { gap: 6px; }
      .grading { margin-left: 0; }
      .err-bubble { margin-left: 0; }
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback } = React;

/* ═══════════════════════════
   HELPERS
═══════════════════════════ */
const genId = () => Math.random().toString(36).slice(2, 10);

const fmtTime = (iso) =>
  new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

const fmtDate = (iso) => {
  const d = new Date(iso);
  const today = new Date();
  const yest  = new Date(); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'আজ';
  if (d.toDateString() === yest.toDateString())  return 'গতকাল';
  return d.toLocaleDateString('bn-BD', { month: 'short', day: 'numeric' });
};

const renderMd = (text) => {
  if (!window.marked || !text) return text || '';
  try {
    marked.setOptions({ breaks: true, gfm: true });
    return marked.parse(text);
  } catch { return text; }
};

/* ═══════════════════════════
   LOCAL STORAGE
═══════════════════════════ */
const STORE_KEY = 'selfrag_v3';

const load = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } };
const save = (sessions) => { try { localStorage.setItem(STORE_KEY, JSON.stringify(sessions)); } catch {} };

/* ═══════════════════════════
   INITIAL STATE (module-level, runs once)
═══════════════════════════ */
const _stored = load();
const _initSession = _stored.length
  ? null
  : { id: genId(), name: 'নতুন চ্যাট', messages: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
const _initSessions = _stored.length ? _stored : [_initSession];
const _initActiveId = _initSessions[0].id;

/* ═══════════════════════════
   SUGGESTION CHIPS
═══════════════════════════ */
const SUGGESTIONS = [
  "Who has won the most World Cups?",
  "Top 5 all-time goal scorers?",
  "Messi vs Ronaldo career stats",
  "Best Premier League teams of all time",
  "Who won the 2024 Champions League?",
  "Youngest Ballon d'Or winners?",
];

/* ═══════════════════════════
   STATUS PILL
═══════════════════════════ */
function StatusPill({ connected, onRefresh }) {
  const cls   = connected === null ? 'idle' : connected ? 'ok' : 'fail';
  const dotCls = cls;
  const label  = connected === null ? 'চেক হচ্ছে…' : connected ? 'কানেক্টেড' : 'সার্ভার বন্ধ';
  return (
    <button className={`status-pill ${cls}`} onClick={onRefresh} title="Click to re-check">
      <span className={`status-dot ${dotCls}`} />
      <span>{label}</span>
    </button>
  );
}

/* ═══════════════════════════
   COPY BUTTON
═══════════════════════════ */
function CopyBtn({ text }) {
  const [done, setDone] = useState(false);
  const copy = async () => {
    try { await navigator.clipboard.writeText(text); setDone(true); setTimeout(() => setDone(false), 2200); }
    catch {}
  };
  return (
    <button className={`copy-btn ${done ? 'done' : ''}`} onClick={copy}>
      <span>{done ? '✓' : '⎘'}</span>
      <span>{done ? 'কপি হয়েছে' : 'কপি'}</span>
    </button>
  );
}

/* ═══════════════════════════
   GRADING PANEL
═══════════════════════════ */
function GradingPanel({ grading }) {
  const items = [
    { key: 'documents_relevant', label: 'Relevant',  tip: 'Documents are relevant to the query' },
    { key: 'generation_grounded', label: 'Grounded', tip: 'Answer is grounded in retrieved docs' },
    { key: 'generation_useful',   label: 'Useful',   tip: 'Answer is useful to the user' },
  ];
  return (
    <div className="grading">
      <div className="grading-head">
        <span>⚙</span>
        <span>Self-RAG Grading</span>
      </div>
      <div className="grading-row">
        {items.map(({ key, label, tip }) => {
          const val = grading[key];
          const cls = val === null || val === undefined ? 'na' : val ? 'pass' : 'fail';
          const icon = cls === 'na' ? '–' : val ? '✓' : '✕';
          return (
            <span key={key} className={`g-badge ${cls}`} title={tip}>
              <span className="g-icon">{icon}</span>
              <span>{label}</span>
            </span>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════
   TYPING INDICATOR
═══════════════════════════ */
function TypingIndicator() {
  return (
    <div className="typing-row">
      <div className="avatar bot-av">⚽</div>
      <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
        <div className="typing-dots">
          <div className="t-dot" /><div className="t-dot" /><div className="t-dot" />
        </div>
        <span className="typing-label">Self-RAG ভাবছে…</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════
   STREAMING TEXT
═══════════════════════════ */
function StreamingText({ text, onDone }) {
  const [displayed, setDisplayed] = useState('');
  const [finished, setFinished] = useState(false);

  useEffect(() => {
    setDisplayed(''); setFinished(false);
    if (!text) return;
    let i = 0;
    const speed = Math.max(2, Math.ceil(text.length / 90));
    const timer = setInterval(() => {
      i = Math.min(i + speed, text.length);
      setDisplayed(text.slice(0, i));
      if (i >= text.length) {
        clearInterval(timer);
        setFinished(true);
        onDone?.();
      }
    }, 18);
    return () => clearInterval(timer);
  }, [text]);

  if (finished) {
    return <div className="bubble bot-b" dangerouslySetInnerHTML={{ __html: renderMd(text) }} />;
  }
  return (
    <div className="bubble bot-b" style={{ whiteSpace:'pre-wrap' }}>
      {displayed}<span className="stream-cursor" />
    </div>
  );
}

/* ═══════════════════════════
   MESSAGE ITEM
═══════════════════════════ */
function MsgItem({ msg, isStreaming, onStreamDone }) {
  const isUser = msg.role === 'user';

  return (
    <div className="msg-group">
      <div className={`msg-row ${isUser ? 'user-row' : ''}`}>
        <div className={`avatar ${isUser ? 'user-av' : 'bot-av'}`}>
          {isUser ? '👤' : '⚽'}
        </div>

        {isUser ? (
          <div className="bubble user-b">{msg.content}</div>
        ) : isStreaming ? (
          <StreamingText text={msg.content} onDone={onStreamDone} />
        ) : (
          <div className="bubble bot-b" dangerouslySetInnerHTML={{ __html: renderMd(msg.content) }} />
        )}
      </div>

      {/* Footer: timestamp + copy */}
      <div className={`msg-footer ${isUser ? 'user-foot' : ''}`}>
        <span className="ts">{fmtTime(msg.timestamp)}</span>
        {!isUser && !isStreaming && msg.content && <CopyBtn text={msg.content} />}
      </div>

      {/* Grading for assistant */}
      {!isUser && msg.grading && !isStreaming && <GradingPanel grading={msg.grading} />}

      {/* Error */}
      {msg.error && (
        <div className="err-bubble">
          <span style={{marginRight:6}}>⚠</span>{msg.error}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════
   SESSION ITEM
═══════════════════════════ */
function SessionItem({ session, active, onSelect, onDelete }) {
  return (
    <div className={`session-item ${active ? 'active' : ''}`} onClick={onSelect}>
      <div className="session-name">{session.name}</div>
      <div className="session-meta">
        <span>{fmtDate(session.updatedAt)}</span>
        <span>·</span>
        <span>{session.messages.length} msg</span>
      </div>
      <button className="session-del"
        onClick={(e) => { e.stopPropagation(); onDelete(session.id); }}
        title="Delete session">×</button>
    </div>
  );
}

/* ═══════════════════════════
   APP
═══════════════════════════ */
function App() {
  const [sessions,  setSessions ] = useState(_initSessions);
  const [activeId,  setActiveId ] = useState(_initActiveId);
  const [baseUrl,   setBaseUrl  ] = useState('http://127.0.0.1:8000');
  const [userId,    setUserId   ] = useState('masum');
  const [question,  setQuestion ] = useState('');
  const [loading,   setLoading  ] = useState(false);
  const [connected, setConnected] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 768);
  const [isMobile,    setIsMobile   ] = useState(window.innerWidth <= 768);
  const [lastStreamId, setLastStreamId] = useState(null);

  const bottomRef  = useRef(null);
  const textareaRef = useRef(null);

  const activeSession = sessions.find(s => s.id === activeId);
  const messages = activeSession?.messages || [];

  /* Persist */
  useEffect(() => { save(sessions); }, [sessions]);

  /* Scroll to bottom */
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  /* Auto-resize textarea */
  useEffect(() => {
    const ta = textareaRef.current;
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
  }, [question]);

  /* Window resize */
  useEffect(() => {
    const handle = () => {
      const mobile = window.innerWidth <= 768;
      setIsMobile(mobile);
      if (!mobile) setSidebarOpen(true);
    };
    window.addEventListener('resize', handle);
    return () => window.removeEventListener('resize', handle);
  }, []);

  /* Health check */
  const checkHealth = useCallback(async () => {
    try {
      const res = await fetch(`${baseUrl}/health`, { signal: AbortSignal.timeout(4000) });
      setConnected(res.ok);
    } catch { setConnected(false); }
  }, [baseUrl]);

  useEffect(() => {
    setConnected(null);
    checkHealth();
    const t = setInterval(checkHealth, 30000);
    return () => clearInterval(t);
  }, [checkHealth]);

  /* Session helpers */
  const mutSession = useCallback((id, fn) => {
    setSessions(prev => prev.map(s => {
      if (s.id !== id) return s;
      return { ...fn(s), updatedAt: new Date().toISOString() };
    }));
  }, []);

  const newSession = () => {
    const id = genId();
    const n   = sessions.length + 1;
    setSessions(prev => [{
      id, name: `নতুন চ্যাট ${n}`, messages: [],
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    }, ...prev]);
    setActiveId(id);
    if (isMobile) setSidebarOpen(false);
  };

  const deleteSession = (id) => {
    setSessions(prev => {
      const rest = prev.filter(s => s.id !== id);
      if (rest.length === 0) {
        const fresh = {
          id: genId(), name: 'নতুন চ্যাট', messages: [],
          createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        };
        setActiveId(fresh.id);
        return [fresh];
      }
      if (activeId === id) setActiveId(rest[0].id);
      return rest;
    });
  };

  /* Send */
  const send = async (overrideQ) => {
    const q = (overrideQ ?? question).trim();
    if (!q || loading) return;
    setQuestion('');

    const ts = new Date().toISOString();
    const userMsg = { id: genId(), role:'user', content: q, timestamp: ts };

    mutSession(activeId, s => {
      const updated = { ...s, messages: [...s.messages, userMsg] };
      // Auto-name session from first message
      if (!s.messages.length) updated.name = q.slice(0, 38) + (q.length > 38 ? '…' : '');
      return updated;
    });
    setLoading(true);

    try {
      const res = await fetch(`${baseUrl}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, session_id: activeId, question: q }),
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`HTTP ${res.status}: ${txt.slice(0, 240)}`);
      }
      const data = await res.json();
      const msgId = genId();
      setLastStreamId(msgId);
      const botMsg = {
        id: msgId, role: 'assistant',
        content: data.answer,
        grading: {
          documents_relevant:  data.documents_relevant  ?? null,
          generation_grounded: data.generation_grounded ?? null,
          generation_useful:   data.generation_useful   ?? null,
        },
        timestamp: new Date().toISOString(),
      };
      mutSession(activeId, s => ({ ...s, messages: [...s.messages, botMsg] }));
    } catch (err) {
      const errMsg = {
        id: genId(), role: 'assistant',
        content: 'উত্তর পাওয়া যায়নি।', error: err.message,
        timestamp: new Date().toISOString(),
      };
      mutSession(activeId, s => ({ ...s, messages: [...s.messages, errMsg] }));
    } finally {
      setLoading(false);
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const sidebarVisible = isMobile ? sidebarOpen : sidebarOpen;

  return (
    <>
      {/* ── Header ─────────────────────────── */}
      <header className="header">
        <button className="hamburger" onClick={() => setSidebarOpen(o => !o)} aria-label="Toggle sidebar">
          <span /><span /><span />
        </button>
        <div className="header-brand">
          <div className="brand-icon">⚽</div>
          <span className="brand-name">Self-RAG Football Assistant</span>
          <span className="brand-tag">BETA</span>
        </div>
        <div className="header-right">
          <StatusPill connected={connected} onRefresh={checkHealth} />
        </div>
      </header>

      <div className="app-layout">
        {/* ── Sidebar overlay (mobile) ──── */}
        {isMobile && sidebarOpen && (
          <div className="sidebar-overlay show" onClick={() => setSidebarOpen(false)} />
        )}

        {/* ── Sidebar ──────────────────── */}
        <aside className={`sidebar ${!sidebarVisible ? 'closed' : ''} ${isMobile && sidebarOpen ? 'mobile-open' : ''}`}>
          <div className="sidebar-top">
            <button className="new-chat-btn" onClick={newSession}>
              <span style={{fontSize:18}}>+</span>
              <span>নতুন চ্যাট</span>
            </button>
          </div>
          <div className="sessions-scroll">
            <div className="sessions-label">সেশন তালিকা</div>
            {sessions.map(s => (
              <SessionItem
                key={s.id}
                session={s}
                active={s.id === activeId}
                onSelect={() => { setActiveId(s.id); if (isMobile) setSidebarOpen(false); }}
                onDelete={deleteSession}
              />
            ))}
          </div>
        </aside>

        {/* ── Chat area ───────────────── */}
        <main className="chat-area">

          {/* Config bar */}
          <div className="config-bar">
            <div className="cfg-group">
              <span className="cfg-label">API URL</span>
              <input id="cfg-url" className="cfg-input" value={baseUrl}
                onChange={e => setBaseUrl(e.target.value)} style={{ minWidth:160 }} />
            </div>
            <div className="cfg-sep" />
            <div className="cfg-group">
              <span className="cfg-label">User ID</span>
              <input id="cfg-uid" className="cfg-input" value={userId}
                onChange={e => setUserId(e.target.value)} style={{ minWidth:80 }} />
            </div>
            <div className="cfg-sep" />
            <div className="cfg-group" style={{ marginLeft:'auto' }}>
              <span className="cfg-label">Session</span>
              <span className="session-id-tag">{activeId.slice(0, 8)}</span>
            </div>
          </div>

          {/* Messages */}
          <div className="msgs-wrap">
            {messages.length === 0 ? (
              <div className="empty">
                <div className="empty-ball">⚽</div>
                <div className="empty-title">Football Assistant</div>
                <div className="empty-sub">
                  Self-RAG দিয়ে football সম্পর্কে যেকোনো প্রশ্ন করুন।
                  প্রতিটি উত্তরে relevance grading দেখাবে।
                </div>
                <div className="chips">
                  {SUGGESTIONS.map(s => (
                    <button key={s} className="chip" onClick={() => send(s)}>{s}</button>
                  ))}
                </div>
              </div>
            ) : (
              messages.map(m => (
                <MsgItem
                  key={m.id}
                  msg={m}
                  isStreaming={m.id === lastStreamId}
                  onStreamDone={() => setLastStreamId(null)}
                />
              ))
            )}
            {loading && <TypingIndicator />}
            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div className="input-zone">
            <div className="input-box">
              <textarea
                id="chat-input"
                ref={textareaRef}
                className="chat-ta"
                rows={1}
                value={question}
                onChange={e => setQuestion(e.target.value)}
                onKeyDown={handleKey}
                placeholder="প্রশ্ন লিখুন…"
                disabled={loading}
              />
              <button
                id="send-btn"
                className="send-btn"
                onClick={() => send()}
                disabled={loading || !question.trim()}
                title="Send (Enter)">
                ➤
              </button>
            </div>
            <div className="input-hint">
              <span><span className="hint-key">Enter</span> পাঠান</span>
              <span><span className="hint-key">Shift</span>+<span className="hint-key">Enter</span> নতুন লাইন</span>
            </div>
          </div>
        </main>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
